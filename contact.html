<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jovin Jijo</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #fff; color: #111; font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.6; overflow-x: hidden; }
    .wipe-overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: grid; grid-template-columns: repeat(5, 1fr); }
    .wipe-col { background: #000; height: 100vh; transform: translateY(-100%); transition: transform 0.45s cubic-bezier(0.76, 0, 0.24, 1); }
    .wipe-col.active { transform: translateY(0); }
    .wipe-col.gone { transform: translateY(100%); }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 56px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; background: transparent; transition: background 0.3s ease, backdrop-filter 0.3s ease; }
    nav.scrolled { background: rgba(255,255,255,0.82); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    nav.menu-open { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }
    nav::before { content: ''; position: absolute; inset: 0; z-index: -1; background: #000; clip-path: circle(0% at calc(100% - 28px) 28px); transition: clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1); }
    nav.menu-open::before { clip-path: circle(150% at calc(100% - 28px) 28px); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: #111; text-decoration: none; letter-spacing: 0.01em; transition: color 0.5s ease, opacity 0.2s; }
    .nav-logo:hover { opacity: 0.5; }
    nav.menu-open .nav-logo { color: rgba(255,255,255,0.4); }
    .nav-right { display: flex; align-items: center; }
    .nav-links { display: flex; list-style: none; }
    .nav-links li { opacity: 0; transform: translateY(-4px); transition: opacity 0.35s ease, transform 0.35s ease; }
    .nav-links li.visible { opacity: 1; transform: translateY(0); }
    .nav-links a { display: block; padding: 3px 8px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; font-size: 11px; color: #111; text-decoration: none; position: relative; transition: color 0.5s ease; }
    .nav-links a::after { content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px; height: 1px; background: #111; transform: scaleX(0); transform-origin: right; transition: transform 0.3s ease; }
    .nav-links a:hover::after { transform: scaleX(1); transform-origin: left; }
    nav.menu-open .nav-links a { color: rgba(255,255,255,0.5); }
    .hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px 4px; margin-left: 12px; }
    .hamburger span { display: block; width: 20px; height: 1px; background: #111; transition: transform 0.35s ease 0.25s, opacity 0.35s ease 0.25s, background 0.5s ease; }
    .hamburger:not(.open) span { transition: transform 0.25s ease, opacity 0.25s ease, background 0.5s ease; }
    nav.menu-open .hamburger span { background: #fff; }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    .mobile-menu { position: fixed; inset: 0; z-index: 998; background: #000; display: flex; flex-direction: column; justify-content: center; pointer-events: none; padding: 80px 32px 56px; clip-path: circle(0% at calc(100% - 28px) 28px); transition: clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1); }
    .mobile-menu.open { clip-path: circle(150% at calc(100% - 28px) 28px); pointer-events: all; background: rgba(0,0,0,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .mobile-menu-links { display: flex; flex-direction: column; gap: 4px; flex: 1; justify-content: center; }
    .mobile-menu-links a { font-family: 'EB Garamond', serif; font-size: clamp(44px, 10vw, 68px); font-weight: 400; color: #fff; text-decoration: none; line-height: 1.2; opacity: 0; transform: translateY(16px); transition: opacity 0.35s ease, transform 0.35s ease, color 0.2s; }
    .mobile-menu.open .mobile-menu-links a { opacity: 1; transform: translateY(0); }
    .mobile-menu.open .mobile-menu-links a:nth-child(1) { transition-delay: 0.28s; }
    .mobile-menu.open .mobile-menu-links a:nth-child(2) { transition-delay: 0.34s; }
    .mobile-menu.open .mobile-menu-links a:nth-child(3) { transition-delay: 0.40s; }
    .mobile-menu.open .mobile-menu-links a:nth-child(4) { transition-delay: 0.46s; }
    .mobile-menu-links a:hover { color: rgba(255,255,255,0.5); }
    .mobile-menu-socials { display: flex; gap: 16px; opacity: 0; transition: opacity 0.3s ease 0.55s; }
    .mobile-menu.open .mobile-menu-socials { opacity: 1; }
    .mobile-menu-socials a { font-size: 10px; letter-spacing: 0.14em; color: rgba(255,255,255,0.45); text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-transform: uppercase; transition: color 0.2s; }
    .mobile-menu-socials a:hover { color: #fff; }
    @media (max-width: 640px) { nav { padding: 0 20px; } .nav-links { display: none; } .mobile-menu { padding: 80px 28px 48px; } }
    .page-title { padding: 80px 24px 28px; font-size: clamp(56px, 12vw, 100px); font-weight: 400; letter-spacing: -0.02em; line-height: 1; color: #111; font-family: 'EB Garamond', serif; opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .page-title.visible { opacity: 1; transform: translateY(0); }
    .contact-body { padding: 0 24px 80px; border-top: 1px solid #f0f0f0; opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s; }
    .contact-body.visible { opacity: 1; transform: translateY(0); }
    .contact-intro { font-family: 'Courier New', monospace; font-size: 14px; color: #444; line-height: 2; margin-bottom: 40px; padding-top: 36px; }
    .contact-links { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }
    .contact-link { font-family: 'Courier New', monospace; font-size: 14px; color: #111; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: opacity 0.2s; }
    .contact-link:hover { opacity: 0.4; }
    .contact-link::before { content: '→'; color: #bbb; }
    .form { border: 1px solid #ccc; }
    .f-field { border-bottom: 1px solid #ccc; }
    .f-field:last-of-type { border-bottom: none; }
    .f-field label { display: block; font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #999; padding: 14px 18px 4px; }
    .f-field input, .f-field textarea { display: block; width: 100%; background: transparent; border: none; outline: none; font-family: 'Courier New', monospace; font-size: 14px; color: #111; padding: 4px 18px 16px; resize: none; }
    .f-field textarea { min-height: 110px; }
    .f-field input::placeholder, .f-field textarea::placeholder { color: #ccc; }
    .f-btn { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; background: transparent; border: none; border-top: 1px solid #ccc; width: 100%; font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 0.08em; color: #888; cursor: pointer; transition: color 0.2s, background 0.2s; }
    .f-btn:hover { background: #f5f5f5; color: #111; }
    @media (min-width: 641px) { .page-title { padding: 88px 32px 28px; } .contact-body { padding: 0 32px 80px; } }
    @media (min-width: 900px) { .contact-body { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; max-width: 960px; } .contact-links { margin-bottom: 0; } }
  </style>
</head>
<body>
<div class="wipe-overlay">
  <div class="wipe-col"></div><div class="wipe-col"></div><div class="wipe-col"></div>
  <div class="wipe-col"></div><div class="wipe-col"></div>
</div>
<nav id="nav">
  <a class="nav-logo" href="/">Jovin.</a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="https://x.com/jovin_jijo" target="_blank">X</a></li>
      <li><a href="https://linkedin.com/in/jovin-jijo" target="_blank">IN</a></li>
      <li><a href="https://instagram.com/jovin_jijo" target="_blank">IG</a></li>
      <li><a href="https://github.com/jovin-jijo" target="_blank">GH</a></li>
      <li><a href="https://youtube.com/@jovin_jijo" target="_blank">YT</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <div class="mobile-menu-links">
    <a href="/" class="mob-link">Home</a>
    <a href="about.html" class="mob-link">About</a>
    <a href="projects.html" class="mob-link">Projects</a>
    <a href="contact.html" class="mob-link">Contact</a>
  </div>
  <div class="mobile-menu-socials">
    <a href="https://x.com/jovin_jijo" target="_blank">X</a>
    <a href="https://linkedin.com/in/jovin-jijo" target="_blank">IN</a>
    <a href="https://instagram.com/jovin_jijo" target="_blank">IG</a>
    <a href="https://github.com/jovin-jijo" target="_blank">GH</a>
    <a href="https://youtube.com/@jovin_jijo" target="_blank">YT</a>
  </div>
</div>
<h1 class="page-title" id="page-title">Contact</h1>
<div class="contact-body" id="contact-body">
  <div>
    <p class="contact-intro">If you want to work on something together or just say hey — reach out. I check my messages.</p>
    <div class="contact-links">
      <a class="contact-link" href="mailto:jovinjijo18@gmail.com">Gmail</a>
      <a class="contact-link" href="https://github.com/jovin-jijo" target="_blank">GitHub</a>
      <a class="contact-link" href="https://linkedin.com/in/jovin-jijo" target="_blank">LinkedIn</a>
      <a class="contact-link" href="https://x.com/jovin_jijo" target="_blank">X / Twitter</a>
    </div>
  </div>
  <div class="form">
    <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="f-field"><label>Name</label><input type="text" name="name" placeholder="Your name" required /></div>
      <div class="f-field"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required /></div>
      <div class="f-field"><label>Message</label><textarea name="message" placeholder="Say something..." required></textarea></div>
      <button type="submit" class="f-btn"><span id="btn-text">Send</span><span>→</span></button>
    </form>
  </div>
</div>
<script>
  var hb = document.getElementById('hamburger'), menu = document.getElementById('mobile-menu'), nav = document.getElementById('nav');
  hb.addEventListener('click', function() { var open = menu.classList.toggle('open'); hb.classList.toggle('open', open); nav.classList.toggle('menu-open', open); document.body.style.overflow = open ? 'hidden' : ''; });
  document.querySelectorAll('.mob-link').forEach(function(l) { l.addEventListener('click', function() { menu.classList.remove('open'); hb.classList.remove('open'); nav.classList.remove('menu-open'); document.body.style.overflow = ''; }); });
  window.addEventListener('scroll', function() { nav.classList.toggle('scrolled', window.scrollY > 10); });
  document.querySelectorAll('.wipe-col').forEach(function(col, i) { col.classList.add('active'); setTimeout(function() { col.classList.remove('active'); col.classList.add('gone'); }, 100 + i * 80); });
  document.querySelectorAll('.nav-links li').forEach(function(li, i) { setTimeout(function() { li.classList.add('visible'); }, 420 + i * 80); });
  setTimeout(function() { document.getElementById('page-title').classList.add('visible'); }, 500);
  setTimeout(function() { document.getElementById('contact-body').classList.add('visible'); }, 600);
  var form = document.getElementById('contact-form');
  form.addEventListener('submit', function(e) { e.preventDefault(); var btn = document.getElementById('btn-text'); btn.textContent = 'Sending...'; fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } }).then(function(r) { btn.textContent = r.ok ? 'Sent!' : 'Error'; if (r.ok) form.reset(); }).catch(function() { btn.textContent = 'Error'; }); });
</script>
</body>
</html>
