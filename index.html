<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jovin Jijo — Systems Archive</title>
<link href="https://googleapis.com" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter', sans-serif;
  background:#ffffff;
  color:#111;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── CENTERED FLOATING PILL NAV (REFINED) ── */
.nav {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(0, 0, 0, 0.1); /* Subtle gray border */
  border-radius: 100px;
  padding: 4px;
}
.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #888;
  text-decoration: none;
  padding: 8px 18px;
  transition: color 0.3s;
}
.nav-link:hover, .nav-link.active { color: #000; }

/* ── QUAD-PANE HERO ── */
.hero-container {
  height: 100vh;
  display: flex;
  overflow: hidden;
  position: relative;
}
.hero-pane {
  flex: 1;
  height: 100%;
  position: relative;
  transition: flex 0.6s cubic-bezier(0.19, 1, 0.22, 1);
  background-size: cover;
  background-position: center;
  filter: grayscale(100%); /* Desaturated by default */
}
.hero-pane:hover {
  flex: 1.6;
  filter: grayscale(0%); /* Color on hover */
}
.pane-label {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) rotate(-90deg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #fff;
  opacity: 0.6;
}
.hero-title-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
}
.hero-title-overlay h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(24px, 4vw, 48px);
  letter-spacing: 0.3em;
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* ── ARCHIVE GRID ── */
.section-wrap { max-width: 1200px; margin: 0 auto; padding: 100px 24px; }
.archive-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
}
.archive-card { text-decoration: none; color: inherit; }
.card-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #aaa;
  margin-bottom: 12px;
}
.card-img {
  width: 100%;
  aspect-ratio: 4/5;
  background: #f5f5f7;
  border-radius: 4px;
  overflow: hidden;
}
.card-title {
  margin-top: 16px;
  font-size: 16px;
  font-weight: 500;
}
.resume-card {
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

/* ── FOOTER ── */
footer { text-align: center; padding: 100px 24px; border-top: 1px solid #eee; }
.contact-email {
  font-size: clamp(24px, 5vw, 64px);
  font-weight: 600;
  text-decoration: none;
  color: #000;
  display: block;
  margin-bottom: 40px;
}
</style>
</head>
<body>

<nav class="nav">
  <a href="#" class="nav-link">Jovin Jijo</a>
  <a href="#archive" class="nav-link">Archive</a>
  <a href="#contact" class="nav-link">Contact</a>
</nav>

<section class="hero-container">
  <div class="hero-title-overlay">
    <h1>SYSTEMS / LIGHT / CHEMISTRY</h1>
  </div>
  <!-- Replace background-image URLs with your Photoshop-graded iPhone 16e shots -->
  <div class="hero-pane" style="background-image: url('code-hero.jpg');"><span class="pane-label">01. CODE</span></div>
  <div class="hero-pane" style="background-image: url('photo-hero.jpg');"><span class="pane-label">02. PHOTO</span></div>
  <div class="hero-pane" style="background-image: url('eng-hero.jpg');"><span class="pane-label">03. ENG</span></div>
  <div class="hero-pane" style="background-image: url('cook-hero.jpg');"><span class="pane-label">04. COOK</span></div>
</section>

<section id="archive" class="section-wrap">
  <div class="archive-grid">
    <!-- Example Log Entry -->
    <a href="#" class="archive-card">
      <div class="card-meta">LOG_024 // ISEF // 2024</div>
      <div class="card-img"></div>
      <div class="card-title">Autonomous PID Drone Calibration</div>
    </a>
    
    <!-- Resume Tile -->
    <a href="resume.pdf" class="archive-card resume-card">
      <div>
        <div class="card-meta" style="color: #666;">FILE_CV</div>
        <div class="card-title">DOWNLOAD FULL<br>TECHNICAL RESUME</div>
      </div>
    </a>
  </div>
</section>

<footer id="contact">
  <a href="mailto:hello@jovinjijo.com" class="contact-email">hello@jovinjijo.com</a>
  <p style="font-family: 'JetBrains Mono'; font-size: 12px; color: #888;">
    <span style="color: #00ff00;">●</span> CURRENTLY DOCUMENTING FOR ISEF 2024
  </p>
</footer>

</body>
</html>
