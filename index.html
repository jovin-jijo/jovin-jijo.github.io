<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jovin Jijo</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --grey-dark: #313131;
  --grey-light: #f1f1f1;
  --muted: rgba(0,0,0,0.45);
  /* The exact Ansa Easing */
  --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
}

body {
  margin: 0;
  font-family: "DM Sans", sans-serif;
  background: #fff;
  color: #000;
  -webkit-font-smoothing: antialiased;
}

/* =========================
   LOUIS ANSA NAV REPLICATION
========================= */
.nav-wrapper {
  position: fixed;
  top: 40px; 
  right: 40px;
  z-index: 1000;
  display: flex;
  align-items: center;
}

.toggle {
  position: relative;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 100px;
  padding: 4px;
}

/* The "Glider" is actually a shape-shifting SVG in his build */
.toggle__svg {
  position: absolute;
  top: 4px;
  left: 4px;
  height: calc(100% - 8px);
  pointer-events: none;
  z-index: 1;
  transition: transform 0.6s var(--ease-out-expo), width 0.6s var(--ease-out-expo), opacity 0.3s ease;
  opacity: 0;
}

.toggle__svg rect {
  fill: var(--grey-dark);
}

.toggle__inner {
  display: flex;
  position: relative;
  z-index: 2;
}

.nav-link {
  font-family: "Poppins", sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  color: var(--grey-dark);
  padding: 12px 24px;
  text-decoration: none;
  transition: color 0.4s var(--ease-out-expo);
  cursor: pointer;
}

.nav-link:hover {
  opacity: 0.7;
}

.nav-link.is-selected {
  color: #fff;
  opacity: 1;
}

/* =========================
   HERO SECTION 
========================= */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: clamp(40px, 8vw, 88px);
  letter-spacing: -0.04em;
  font-weight: 400;
  margin: 0;
}

.hero-meta {
  margin-top: 40px;
  font-family: "Poppins", sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

#clock-wrap {
  color: #000;
  font-weight: 500;
  display: inline-flex;
  gap: 8px;
  align-items: center;
}

.tz-box {
  font-size: 10px;
  background: var(--grey-light);
  padding: 2px 6px;
  border-radius: 4px;
}
</style>
</head>

<body>

<div class="nav-wrapper">
  <div class="toggle">
    <svg class="toggle__svg" id="glider-svg">
      <rect x="0" y="0" width="100%" height="100%" rx="100" />
    </svg>
    
    <div class="toggle__inner">
      <a href="#" class="nav-link" onmouseenter="moveGlider(this)">Index</a>
      <a href="#" class="nav-link" onmouseenter="moveGlider(this)">About</a>
    </div>
  </div>
</div>

<div class="hero">
  <h1>Jovin Jijo<br><em>Multidisciplinary</em></h1>
  <p class="hero-meta">
    Aurora, IL &nbsp;·&nbsp; 
    <span id="clock-wrap">
      <span id="clock">00:00:00 AM</span>
      <span id="offset" class="tz-box">CT</span>
    </span>
  </p>
</div>

<script>
const glider = document.getElementById('glider-svg');
const links = document.querySelectorAll('.nav-link');

function moveGlider(el) {
  const rect = el.getBoundingClientRect();
  const parentRect = el.parentElement.getBoundingClientRect();
  
  // Reset all links
  links.forEach(l => l.classList.remove('is-selected'));
  
  // Animate SVG Glider
  glider.style.opacity = "1";
  glider.style.width = rect.width + "px";
  glider.style.transform = `translateX(${rect.left - parentRect.left}px)`;
  
  // Highlight text
  el.classList.add('is-selected');
}

// Reset glider when leaving nav
document.querySelector('.toggle').addEventListener('mouseleave', () => {
  glider.style.opacity = "0";
  links.forEach(l => l.classList.remove('is-selected'));
});

// --- CLOCK WITH CT OFFSET ---
function updateClock() {
  const now = new Date();
  
  const auroraTime = now.toLocaleTimeString('en-US', { 
    hour: '2-digit', minute: '2-digit', second: '2-digit', 
    hour12: true, timeZone: 'America/Chicago' 
  });
  document.getElementById('clock').textContent = auroraTime;

  const userMin = now.getTimezoneOffset();
  const auroraDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/Chicago' }));
  const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  const auroraMin = (utcDate - auroraDate) / 60000;

  const diff = Math.round((auroraMin - userMin) / 60);
  const sign = diff >= 0 ? "+" : "";
  document.getElementById('offset').textContent = diff === 0 ? "CT" : `CT ${sign}${diff}H`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
